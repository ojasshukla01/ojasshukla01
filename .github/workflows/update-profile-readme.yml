# Self-updating profile README (marker replacement pattern).
# https://simonwillison.net/2020/Jul/10/self-updating-profile-readme/
#
# Branch protection: if rules block the default GITHUB_TOKEN from pushing to `main`,
# use a fine-grained PAT with contents:write on this repo and set e.g.
#   env:
#     GITHUB_TOKEN: ${{ secrets.PROFILE_README_TOKEN }}
# (add the secret under Settings → Secrets and variables → Actions).

name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # Daily ~06:17 UTC — adjust cadence as needed
    - cron: "17 6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build_readme.py"
      - ".github/workflows/update-profile-readme.yml"
      - "requirements.txt"

concurrency:
  group: profile-readme-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned SHAs — Dependabot can propose updates.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh README sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/build_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore: refresh profile README activity sections"
            git push
          fi
