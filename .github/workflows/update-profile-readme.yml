# Self-updating profile README (marker replacement pattern).
# https://simonwillison.net/2020/Jul/10/self-updating-profile-readme/

name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # Hourly at :42 UTC — adjust if you prefer less frequent commits
    - cron: "42 * * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build_readme.py"
      - ".github/workflows/update-profile-readme.yml"
      - "requirements.txt"

concurrency:
  group: profile-readme-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh README sections
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/build_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes."
          else
            git commit -m "chore: refresh profile README activity sections"
            git push
          fi
